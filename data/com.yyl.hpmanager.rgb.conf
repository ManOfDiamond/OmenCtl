<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy user="root">
    <allow own="com.yyl.hpmanager.rgb"/>
  </policy>
  <policy context="default">
    <allow receive_sender="com.yyl.hpmanager.rgb"/>
  </policy>
  <policy group="wheel">
    <allow send_destination="com.yyl.hpmanager.rgb"/>
    <allow receive_sender="com.yyl.hpmanager.rgb"/>
  </policy>
  <policy group="sudo">
    <allow send_destination="com.yyl.hpmanager.rgb"/>
    <allow receive_sender="com.yyl.hpmanager.rgb"/>
  </policy>
  <policy group="adm">
    <allow send_destination="com.yyl.hpmanager.rgb"/>
    <allow receive_sender="com.yyl.hpmanager.rgb"/>
  </policy>
</busconfig>

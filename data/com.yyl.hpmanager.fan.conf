<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy user="root">
    <allow own="com.yyl.hpmanager.fan"/>
  </policy>
  <policy context="default">
    <deny send_destination="com.yyl.hpmanager.fan"/>
    <deny receive_sender="com.yyl.hpmanager.fan"/>
    <!-- Allow reading state for all users -->
    <allow send_destination="com.yyl.hpmanager.fan" send_member="GetState"/>
    <allow send_destination="com.yyl.hpmanager.fan" send_member="Ping"/>
  </policy>
  <policy group="wheel">
    <allow send_destination="com.yyl.hpmanager.fan"/>
    <allow receive_sender="com.yyl.hpmanager.fan"/>
  </policy>
  <policy group="sudo">
    <allow send_destination="com.yyl.hpmanager.fan"/>
    <allow receive_sender="com.yyl.hpmanager.fan"/>
  </policy>
  <policy group="adm">
    <allow send_destination="com.yyl.hpmanager.fan"/>
    <allow receive_sender="com.yyl.hpmanager.fan"/>
  </policy>
</busconfig>
